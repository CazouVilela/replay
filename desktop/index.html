<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Replay - Extrator ZenFisio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Barra de controle -->
  <div id="toolbar">
    <div class="toolbar-left">
      <span class="logo">REPLAY</span>
      <span class="separator"></span>
      <label>De: <input type="date" id="date-start"></label>
      <label>Ate: <input type="date" id="date-end"></label>
      <span class="separator"></span>
      <label class="file-label" id="price-table-label">
        Tabela de Precos
        <input type="file" id="price-table" accept=".xlsx,.xls">
      </label>
      <span class="separator"></span>
      <label class="file-label" id="ocr-upload-label">
        Frequencia (OCR)
        <input type="file" id="ocr-upload" accept="image/jpeg,image/png,image/webp">
      </label>
    </div>
    <div class="toolbar-right">
      <button id="btn-start" disabled>Iniciar Extracao</button>
      <button id="btn-stop" class="hidden">Parar</button>
      <button id="btn-discover">Capturar DOM</button>
    </div>
  </div>

  <!-- Status -->
  <div id="status-bar">
    <span id="status-text">Faca login no ZenFisio abaixo e navegue ate o calendario.</span>
    <span id="progress" class="hidden">
      <span id="progress-current">0</span> / <span id="progress-total">0</span>
    </span>
  </div>

  <!-- ZenFisio webview -->
  <webview
    id="zenfisio"
    src="https://app.zenfisio.com/calendar"
    allowpopups
  ></webview>

  <!-- Painel de resultados OCR -->
  <div id="ocr-results-panel" class="hidden">
    <div id="ocr-results-header">
      <span id="ocr-results-title">Frequencia de Terapias</span>
      <div id="ocr-results-actions">
        <button id="btn-ocr-close" title="Fechar">✕</button>
      </div>
    </div>
    <div id="ocr-results-body">
      <table id="ocr-results-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Data</th>
            <th>Modalidade</th>
            <th>Assinatura</th>
          </tr>
        </thead>
        <tbody id="ocr-results-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Painel de log -->
  <div id="log-panel">
    <div id="log-content"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
